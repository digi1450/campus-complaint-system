<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Complaint - Add Complaint</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Campus Complaint System</h1>
    <nav>
      <a href="index.html">Add Complaint</a>
      <a href="list.html">View Complaints</a>
      <a href="report.html">Reports</a>
    </nav>

    <div class="card">
      <h2>Add Complaint</h2>

      <form id="complaintForm">
        <label>Title</label>
        <input type="text" id="title" name="title" required />

        <label>Category</label>
        <select id="category" name="category" required onchange="toggleCreateCategoryFields()">
          <option value="">Select category</option>
          <option value="Facility">Facility</option>
          <option value="Equipment">Equipment</option>
          <option value="Network">Network</option>
          <option value="Cleanliness">Cleanliness</option>
          <option value="Other">Other</option>
        </select>

        <label>Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <label>Location</label>
        <input type="text" id="location" name="location" required />

        <label>Urgency</label>
        <select id="urgency" name="urgency" required>
          <option value="">Select urgency</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>

        <label>Reporter Name</label>
        <input type="text" id="reporterName" name="reporterName" required />

        <label>Student ID</label>
        <input type="text" id="studentId" name="studentId" required />

        <label>Email</label>
        <input type="email" id="email" name="email" />

        <label>Phone</label>
        <input type="text" id="phone" name="phone" />

        <label>Attachments (comma separated URLs or filenames)</label>
        <input type="text" id="attachments" name="attachments" placeholder="photo1.jpg, report.pdf" />

        <label>Building</label>
        <input type="text" id="building" name="building" />

        <label>Room</label>
        <input type="text" id="room" name="room" />

        <label>Device Type</label>
        <input type="text" id="deviceType" name="deviceType" placeholder="Projector, Router, Air Conditioner" />

        <div id="createFacilityFields" class="category-fields hidden">
          <label>Facility Issue Area</label>
          <input type="text" id="facilityIssueArea" name="facilityIssueArea" placeholder="Restroom, classroom, lighting" />

          <label>Maintenance Needed</label>
          <input type="text" id="facilityMaintenanceNeeded" name="facilityMaintenanceNeeded" placeholder="Repair, replacement, inspection" />
        </div>

        <div id="createEquipmentFields" class="category-fields hidden">
          <label>Equipment Name</label>
          <input type="text" id="equipmentName" name="equipmentName" placeholder="Projector, printer, air conditioner" />

          <label>Serial Number</label>
          <input type="text" id="serialNumber" name="serialNumber" placeholder="Optional serial number" />
        </div>

        <div id="createNetworkFields" class="category-fields hidden">
          <label>Connection Type</label>
          <input type="text" id="connectionType" name="connectionType" placeholder="Wi-Fi, LAN, hotspot" />

          <label>Network Name</label>
          <input type="text" id="networkName" name="networkName" placeholder="CampusWiFi, Lab LAN" />
        </div>

        <div id="createCleanlinessFields" class="category-fields hidden">
          <label>Cleanliness Issue Type</label>
          <input type="text" id="cleanlinessIssueType" name="cleanlinessIssueType" placeholder="Trash, odor, spill" />

          <label>Affected Area</label>
          <input type="text" id="affectedArea" name="affectedArea" placeholder="Hallway, canteen, restroom" />
        </div>

        <label>Tags (comma separated)</label>
        <input type="text" id="tags" name="tags" placeholder="wifi, classroom, building" />

        <button type="submit">Submit Complaint</button>
      </form>

      <p id="formMessage"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
