<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Complaint - View Complaints</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="loadComplaints()">
  <div class="container">
    <h1>Campus Complaint System</h1>
    <nav>
      <a href="index.html">Add Complaint</a>
      <a href="list.html">View Complaints</a>
      <a href="report.html">Reports</a>
    </nav>

    <div class="card">
      <h2>Search Complaints</h2>
      <div class="search-row">
        <input type="text" id="searchKeyword" placeholder="Search by title, location, or category" />
        <button onclick="searchComplaints()">Search</button>
        <button onclick="loadComplaints()">Reset</button>
      </div>
    </div>

    <div class="card">
      <h2>All Complaints</h2>
      <div id="complaintList"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
